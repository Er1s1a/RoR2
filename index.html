<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨中冒险2 · 物品图鉴</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;line-height:1.5}
a{color:inherit;text-decoration:none}

/* ===== Header ===== */
.header{position:sticky;top:0;z-index:100;background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.logo{font-size:1.3rem;font-weight:700;color:#58a6ff;white-space:nowrap}
.count{font-size:0.8rem;color:#8b949e;white-space:nowrap}
.search-box{position:relative;flex:1;min-width:180px;max-width:360px}
.search-box input{width:100%;padding:8px 12px 8px 36px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:0.9rem;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#58a6ff}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:#8b949e}

/* ===== Tabs ===== */
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 16px;border-radius:8px 8px 0 0;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent;border-bottom:none;position:relative;white-space:nowrap;user-select:none}
.tab:hover{background:rgba(255,255,255,0.04)}
.tab.active{border-color:#30363d;background:#0d1117;z-index:1}
.tab .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.tab .badge{font-size:0.7rem;padding:1px 6px;border-radius:10px;margin-left:4px;background:rgba(255,255,255,0.1)}

/* ===== Main Content ===== */
.main{padding:16px;max-width:1400px;margin:0 auto}
.items{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:#8b949e;font-size:1.1rem}

/* ===== Item Card ===== */
.card{border:1px solid #30363d;border-radius:10px;background:#161b22;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;cursor:default}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.card-header{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.card-icon{width:44px;height:44px;border-radius:8px;flex-shrink:0;overflow:hidden}
.card-icon img{display:block;width:44px;height:44px}
.card-info{min-width:0}
.card-name{font-weight:600;font-size:0.95rem;line-height:1.3}
.card-name-en{font-size:0.75rem;color:#8b949e;margin-top:1px}
.card-body{padding:10px 12px}
.card-desc{font-size:0.82rem;color:#b0b8c1;line-height:1.5}
.card-stack{font-size:0.72rem;color:#8b949e;margin-top:6px}
.card-dlc{display:inline-block;font-size:0.65rem;padding:2px 8px;border-radius:10px;margin-top:6px;font-weight:600}

/* Quality border colors */
.q-white .card-header{border-left:3px solid #a0a0a0}
.q-green .card-header{border-left:3px solid #4ade80}
.q-red .card-header{border-left:3px solid #f87171}
.q-orange .card-header{border-left:3px solid #fb923c}
.q-blue .card-header{border-left:3px solid #60a5fa}
.q-void .card-header{border-left:3px solid #c084fc}
.q-boss .card-header{border-left:3px solid #facc15}
.q-storm .card-header{border-left:3px solid #22d3ee}

.q-white .card-icon{background:#3a3a3a}
.q-green .card-icon{background:#14532d}
.q-red .card-icon{background:#7f1d1d}
.q-orange .card-icon{background:#7c2d12}
.q-blue .card-icon{background:#1e3a5f}
.q-void .card-icon{background:#3b0764}
.q-boss .card-icon{background:#713f12}
.q-storm .card-icon{background:#164e63}

/* ===== Footer ===== */
.footer{text-align:center;padding:30px;color:#484f58;font-size:0.75rem}

/* ===== Mobile ===== */
@media(max-width:600px){
  .items{grid-template-columns:1fr;gap:8px}
  .header{padding:8px 10px 0}
  .tab{padding:6px 10px;font-size:0.78rem}
  .card-header{padding:8px 10px}
  .card-body{padding:8px 10px}
}
</style>

// ===== QUALITY CONFIG =====
const QUALITIES = {
  white: {label:"白",color:"#a0a0a0",bg:"#3a3a3a",cls:"q-white"},
  green: {label:"绿",color:"#4ade80",bg:"#14532d",cls:"q-green"},
  red:   {label:"红",color:"#f87171",bg:"#7f1d1d",cls:"q-red"},
  orange:{label:"橙(主动)",color:"#fb923c",bg:"#7c2d12",cls:"q-orange"},
  blue:  {label:"蓝(月球)",color:"#60a5fa",bg:"#1e3a5f",cls:"q-blue"},
  void:  {label:"虚空",color:"#c084fc",bg:"#3b0764",cls:"q-void"},
  boss:  {label:"合金(Boss)",color:"#facc15",bg:"#713f12",cls:"q-boss"},
  storm: {label:"风暴(DLC)",color:"#22d3ee",bg:"#164e63",cls:"q-storm"},
  all:   {label:"全部",color:"#8b949e",bg:"#21262d",cls:""},
};
const TAB_ORDER = ["all","white","green","red","boss","orange","blue","void","storm"];
let activeTab = "all";
let searchTerm = "";

// ===== RENDER TABS =====
function getCount(q) {
  if (q === "storm") return ITEMS.filter(i => i.dlc === "风暴").length;
  if (q === "all") return ITEMS.length;
  return ITEMS.filter(i => i.q === q).length;
}
function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = TAB_ORDER.map(q => {
    const cfg = QUALITIES[q];
    const count = getCount(q);
    const active = q === activeTab ? " active" : "";
    return `<div class="tab${active}" data-q="${q}" onclick="setTab('${q}')">
      <span class="dot" style="background:${cfg.color}"></span>${cfg.label}
      <span class="badge">${count}</span>
    </div>`;
  }).join("");
}

// ===== RENDER ITEMS =====
function renderItems() {
  const container = document.getElementById("items");
  let filtered = ITEMS;

  if (activeTab === "storm") {
    filtered = filtered.filter(i => i.dlc === "风暴");
  } else if (activeTab !== "all") {
    filtered = filtered.filter(i => i.q === activeTab);
  }
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    filtered = filtered.filter(i =>
      i.n.toLowerCase().includes(s) ||
      i.en.toLowerCase().includes(s) ||
      (i.d||"").toLowerCase().includes(s) ||
      (i.dlc||"").toLowerCase().includes(s)
    );
  }

  document.getElementById("count").textContent = `共 ${filtered.length} 件`;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">没有找到匹配的物品</div>';
    return;
  }

  container.innerHTML = filtered.map(i => {
    const cfg = QUALITIES[i.q] || QUALITIES.white;
    const initials = i.n.replace(/[^\u4e00-\u9fff]/g,'').slice(0,2) || i.en.slice(0,2);
    const svgIcon = `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"><rect width="44" height="44" rx="8" fill="${cfg.bg}"/><text x="22" y="29" text-anchor="middle" font-size="16" font-weight="bold" fill="${cfg.color}" font-family="sans-serif">${initials}</text></svg>`)}`;
    const webpFile = i.en.replace(/'/g,'').replace(/ /g,'_').replace(/\./g,'');
    const webpPath = `icons/${webpFile}.webp`;
    const dlcTag = i.dlc ? `<span class="card-dlc" style="background:${i.dlc==='合金'?'#713f12':'#164e63'};color:${i.dlc==='合金'?'#facc15':'#22d3ee'}">${i.dlc} DLC</span>` : "";
    const srcTag = i.src ? `<span class="card-dlc" style="background:#1a1a2e;color:#8b949e">${i.src}</span>` : "";
    return `
    <div class="card ${cfg.cls}">
      <div class="card-header">
        <div class="card-icon" data-svg="${svgIcon.replace(/"/g,'&quot;')}" data-webp="${webpPath}"></div>
        <div class="card-info">
          <div class="card-name" style="color:${cfg.color}">${i.n}</div>
          <div class="card-name-en">${i.en}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-desc">${i.d}</div>
        ${i.s ? `<div class="card-stack">📊 叠加方式：${i.s}</div>` : ''}
        ${dlcTag}${srcTag}
      </div>
    </div>`;
  }).join("");

  // Load icons: try webp first, fall back to SVG on error
  container.querySelectorAll('.card-icon').forEach(el => {
    const img = document.createElement('img');
    img.style.cssText = 'width:44px;height:44px';
    img.src = el.dataset.webp;
    img.onerror = function() { this.src = el.dataset.svg; this.onerror = null; };
    el.appendChild(img);
  });
}

function setTab(q) {
  activeTab = q;
  renderTabs();
  renderItems();
}

// ===== SEARCH =====
document.addEventListener("DOMContentLoaded", () => {
  renderTabs();
  renderItems();
  document.getElementById("search").addEventListener("input", e => {
    searchTerm = e.target.value.trim();
    renderItems();
  });
});
</script>
