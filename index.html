<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨中冒险2 · 全要素图鉴</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;line-height:1.5}
a{color:inherit;text-decoration:none}

/* ===== Header ===== */
.header{position:sticky;top:0;z-index:100;background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.logo{font-size:1.3rem;font-weight:700;color:#58a6ff;white-space:nowrap}
.count{font-size:0.8rem;color:#8b949e;white-space:nowrap}
.search-box{position:relative;flex:1;min-width:180px;max-width:360px}
.search-box input{width:100%;padding:8px 12px 8px 36px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:0.9rem;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#58a6ff}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:#8b949e}

/* ===== Section Nav ===== */
.section-nav{display:flex;gap:0;padding:0 16px;background:#161b22;border-bottom:1px solid #30363d}
.section-tab{flex:1;text-align:center;padding:12px 8px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all .2s;border-bottom:3px solid transparent;color:#8b949e;user-select:none;max-width:220px}
.section-tab:hover{color:#c9d1d9;background:rgba(255,255,255,0.03)}
.section-tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.section-tab.s-sec2.active{color:#22d3ee;border-bottom-color:#22d3ee}
.section-tab.s-sec3.active{color:#c084fc;border-bottom-color:#c084fc}

/* ===== Quality Tabs ===== */
.tabs-wrap{background:#161b22;padding:0 16px}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;padding-top:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 16px;border-radius:8px 8px 0 0;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid transparent;border-bottom:none;position:relative;white-space:nowrap;user-select:none;background:transparent;color:#8b949e}
.tab:hover{background:rgba(255,255,255,0.04);color:#c9d1d9}
.tab.active{border-color:#30363d;background:#0d1117;z-index:1;color:#c9d1d9}
.tab .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.tab .badge{font-size:0.7rem;padding:1px 6px;border-radius:10px;margin-left:4px;background:rgba(255,255,255,0.1)}

/* ===== Main Content ===== */
.main{padding:16px;max-width:1400px;margin:0 auto}
.content-section{display:none}
.content-section.active{display:block}
.items{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:#8b949e;font-size:1.1rem}

/* ===== Item Card ===== */
.card{border:1px solid #30363d;border-radius:10px;background:#161b22;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;cursor:default}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.card-header{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.card-icon{width:44px;height:44px;border-radius:8px;flex-shrink:0;overflow:hidden}
.card-icon img{display:block;width:44px;height:44px}
.card-info{min-width:0}
.card-name{font-weight:600;font-size:0.95rem;line-height:1.3}
.card-name-en{font-size:0.75rem;color:#8b949e;margin-top:1px}
.card-body{padding:10px 12px}
.card-desc{font-size:0.82rem;color:#b0b8c1;line-height:1.5}
.card-stack{font-size:0.72rem;color:#8b949e;margin-top:6px}
.card-dlc{display:inline-block;font-size:0.65rem;padding:2px 8px;border-radius:10px;margin-top:6px;font-weight:600}

.q-white .card-header{border-left:3px solid #a0a0a0}
.q-green .card-header{border-left:3px solid #4ade80}
.q-red .card-header{border-left:3px solid #f87171}
.q-orange .card-header{border-left:3px solid #fb923c}
.q-blue .card-header{border-left:3px solid #60a5fa}
.q-void .card-header{border-left:3px solid #c084fc}
.q-boss .card-header{border-left:3px solid #facc15}
.q-storm .card-header{border-left:3px solid #22d3ee}
.q-white .card-icon{background:#3a3a3a}
.q-green .card-icon{background:#14532d}
.q-red .card-icon{background:#7f1d1d}
.q-orange .card-icon{background:#7c2d12}
.q-blue .card-icon{background:#1e3a5f}
.q-void .card-icon{background:#3b0764}
.q-boss .card-icon{background:#713f12}
.q-storm .card-icon{background:#164e63}

/* ===== Survivor Card ===== */
.survivors{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.survivor-card{border:1px solid #30363d;border-radius:10px;background:#161b22;overflow:hidden;transition:transform .15s,box-shadow .15s}
.survivor-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.survivor-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.06)}
.survivor-icon{width:48px;height:48px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;overflow:hidden}
.survivor-icon img{width:100%;height:100%;object-fit:contain}
.survivor-info{min-width:0;flex:1}
.survivor-name{font-weight:700;font-size:1rem;color:#f0f6fc}
.survivor-name-en{font-size:0.73rem;color:#8b949e;margin-top:1px}
.survivor-stats{font-size:0.7rem;color:#6e7681;margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.survivor-stats span{padding:3px 10px;border-radius:12px;font-weight:600;font-size:0.68rem;white-space:nowrap;letter-spacing:0.3px}
.survivor-stats span:nth-child(1){background:rgba(248,113,113,0.15);color:#fca5a5}
.survivor-stats span:nth-child(2){background:rgba(251,146,60,0.15);color:#fdba74}
.survivor-stats span:nth-child(3){background:rgba(96,165,250,0.15);color:#93c5fd}
.survivor-stat-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-weight:600;font-size:0.68rem;white-space:nowrap;letter-spacing:0.3px}
.survivor-dlc-badge{font-size:0.65rem;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:3px;display:inline-block}
.survivor-expand{font-size:1rem;color:#484f58;transition:transform .25s;flex-shrink:0}
.survivor-card.expanded .survivor-expand{transform:rotate(180deg)}
.survivor-body{display:none;padding:14px;background:rgba(0,0,0,0.15)}
.survivor-card.expanded .survivor-body{display:block}
.survivor-unlock{font-size:0.73rem;color:#8b949e;margin-bottom:12px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:3px solid #facc15}

/* Skills 4-column grid */
.skills-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* Slot-level color coding */
.skill-slot{display:flex;flex-direction:column;gap:8px;padding:8px;border-radius:8px;border-left:3px solid transparent;background:rgba(255,255,255,0.01);transition:background .2s}
.skill-slot:has(.m1){border-left-color:rgba(248,113,113,0.35);background:rgba(248,113,113,0.04)}
.skill-slot:has(.m2){border-left-color:rgba(74,222,128,0.35);background:rgba(74,222,128,0.04)}
.skill-slot:has(.sf){border-left-color:rgba(96,165,250,0.35);background:rgba(96,165,250,0.04)}
.skill-slot:has(.rr){border-left-color:rgba(251,146,60,0.35);background:rgba(251,146,60,0.04)}

/* Slot header */
.skill-slot-hd{text-align:center;font-size:0.75rem;font-weight:700;padding:6px 0 8px;border-radius:4px 4px 0 0;color:#c9d1d9;letter-spacing:0.5px}
.skill-slot-hd.m1{background:rgba(248,113,113,0.2);color:#fca5a5;border-bottom:1px solid rgba(248,113,113,0.3)}
.skill-slot-hd.m2{background:rgba(74,222,128,0.2);color:#86efac;border-bottom:1px solid rgba(74,222,128,0.3)}
.skill-slot-hd.sf{background:rgba(96,165,250,0.2);color:#93c5fd;border-bottom:1px solid rgba(96,165,250,0.3)}
.skill-slot-hd.rr{background:rgba(251,146,60,0.2);color:#fdba74;border-bottom:1px solid rgba(251,146,60,0.3)}
.skill-slot-hd .key{font-size:0.6rem;opacity:0.7;margin-top:2px;display:block;font-weight:400;letter-spacing:0}

/* Skill cards base */
.skill-card{border:1px solid #30363d;border-radius:8px;padding:8px;text-align:center;position:relative;transition:all .2s}

/* Default skill — prominent */
.skill-card.def{padding:12px 10px 14px;background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.1);box-shadow:0 0 12px rgba(255,255,255,0.015)}
.skill-slot:has(.m1) .skill-card.def{border-left:3px solid rgba(248,113,113,0.55)}
.skill-slot:has(.m2) .skill-card.def{border-left:3px solid rgba(74,222,128,0.55)}
.skill-slot:has(.sf) .skill-card.def{border-left:3px solid rgba(96,165,250,0.55)}
.skill-slot:has(.rr) .skill-card.def{border-left:3px solid rgba(251,146,60,0.55)}
.skill-card.def:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);box-shadow:0 0 16px rgba(255,255,255,0.04);transform:translateY(-1px)}

/* Alternate skill — compact secondary */
.skill-card.alt{padding:6px 8px;background:rgba(0,0,0,0.12);border:1px dashed rgba(255,255,255,0.06);opacity:0.85;margin-top:2px}
.skill-card.alt:hover{opacity:1;border-color:rgba(255,255,255,0.14);background:rgba(0,0,0,0.08);box-shadow:0 0 8px rgba(255,255,255,0.02)}

/* Skill icon */
.skill-card .sk-icon{width:36px;height:36px;margin:0 auto 5px;border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(255,255,255,0.05)}
.skill-card.alt .sk-icon{width:28px;height:28px;margin-bottom:3px}
.skill-card .sk-icon img{width:100%;height:100%;object-fit:contain}
.skill-card .sk-name{font-size:0.78rem;font-weight:600;color:#e6edf3;margin-bottom:3px}
.skill-card.alt .sk-name{font-size:0.7rem}
.skill-card .sk-desc{font-size:0.67rem;color:#8b949e;line-height:1.4}
.skill-card.alt .sk-desc{font-size:0.6rem}
.skill-card .sk-tag{display:inline-block;font-size:0.55rem;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.08);color:#6e7681;margin-top:3px;margin-right:2px}

/* Alternate badge */
.skill-alt-badge{font-size:0.58rem;color:#facc15;margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 6px;background:rgba(250,204,21,0.1);border-radius:3px;display:inline-block}
.skill-alt-badge::before{content:"\01F513  "}

/* Unlock condition — more prominent */
.sk-unlock{font-size:0.62rem;color:#e2b714;margin-top:5px;padding:5px 7px;background:rgba(250,204,21,0.06);border:1px solid rgba(250,204,21,0.15);border-radius:4px;line-height:1.35}

/* Passive section */
.survivor-passive{padding:8px 12px;margin-bottom:12px;border-radius:6px;background:rgba(250,204,21,0.05);border:1px solid rgba(250,204,21,0.12);border-left:3px solid #facc15;display:flex;align-items:center;gap:10px}
.survivor-passive .psv-tag{font-size:0.6rem;font-weight:700;padding:3px 7px;border-radius:4px;background:#713f12;color:#facc15;flex-shrink:0;letter-spacing:0.5px}
.survivor-passive .psv-text{font-size:0.72rem;color:#b0b8c1}
.survivor-passive .psv-name{font-weight:600;color:#e6edf3;margin-right:4px}

/* ===== Artifact Card ===== */
.artifacts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.artifact-card{border:1px solid #30363d;border-radius:10px;background:#161b22;overflow:hidden;transition:transform .15s,box-shadow .15s;padding:14px}
.artifact-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.artifact-name{font-weight:700;font-size:1rem;color:#f0f6fc}
.artifact-name-en{font-size:0.73rem;color:#8b949e;margin-top:2px}
.artifact-code{display:flex;gap:6px;margin:10px 0;align-items:center}
.artifact-code .cs{font-size:1.2rem;letter-spacing:2px}
.artifact-code .cs.circle{color:#c9d1d9}
.artifact-code .cs.triangle{color:#4ade80}
.artifact-code .cs.square{color:#fb923c}
.artifact-code .cs.diamond{color:#c084fc}
.artifact-code-special{font-size:0.75rem;color:#8b949e;font-style:italic}
.artifact-desc{font-size:0.82rem;color:#b0b8c1;line-height:1.5;margin-top:4px}
.artifact-dlc{display:inline-block;font-size:0.6rem;padding:2px 7px;border-radius:10px;margin-top:6px;font-weight:600}

/* ===== Footer ===== */
.footer{text-align:center;padding:30px;color:#484f58;font-size:0.75rem}

/* ===== Mobile ===== */
@media(max-width:700px){
  .skills-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .items{grid-template-columns:1fr;gap:8px}
  .survivors{grid-template-columns:1fr;gap:8px}
  .artifacts-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .header{padding:8px 10px 0}
  .section-tab{padding:10px 4px;font-size:0.8rem}
  .tab{padding:6px 10px;font-size:0.78rem}
  .card-header{padding:8px 10px}
  .card-body{padding:8px 10px}
  .survivor-header{padding:10px}
  .survivor-body{padding:10px}
}
</style>
</head>

// ===== SECTION SWITCHING =====
function setSection(section) {
  activeSection = section;
  document.getElementById("tabs-wrap").style.display = (section === "items") ? "block" : "none";
  document.querySelectorAll(".section-tab").forEach(function(t){ t.classList.remove("active"); });
  var st = document.querySelector('.section-tab[data-section="' + section + '"]');
  if (st) st.classList.add("active");
  document.querySelectorAll(".content-section").forEach(function(s){ s.classList.remove("active"); });
  var cs = document.getElementById("sec-" + section);
  if (cs) cs.classList.add("active");
  renderCurrent();
}

// ===== RENDER TABS (quality) =====
function getCount(q) {
  if (q === "storm") return ITEMS.filter(function(i){ return i.dlc === "风暴"; }).length;
  if (q === "all") return ITEMS.length;
  return ITEMS.filter(function(i){ return i.q === q; }).length;
}
function renderTabs() {
  var container = document.getElementById("tabs");
  container.innerHTML = TAB_ORDER.map(function(q) {
    var cfg = QUALITIES[q];
    var count = getCount(q);
    var active = q === activeTab ? " active" : "";
    return '<div class="tab' + active + '" data-q="' + q + '" onclick="setTab(\'' + q + '\')">' +
      '<span class="dot" style="background:' + cfg.color + '"></span>' + cfg.label +
      '<span class="badge">' + count + '</span></div>';
  }).join("");
}

// ===== RENDER ITEMS =====
function renderItems() {
  var container = document.getElementById("items");
  var filtered = ITEMS.slice();
  if (activeTab === "storm") {
    filtered = filtered.filter(function(i){ return i.dlc === "风暴"; });
  } else if (activeTab !== "all") {
    filtered = filtered.filter(function(i){ return i.q === activeTab; });
  }
  if (searchTerm) {
    var s = searchTerm.toLowerCase();
    filtered = filtered.filter(function(i){
      return i.n.toLowerCase().indexOf(s) !== -1 ||
        i.en.toLowerCase().indexOf(s) !== -1 ||
        (i.d||"").toLowerCase().indexOf(s) !== -1 ||
        (i.dlc||"").toLowerCase().indexOf(s) !== -1;
    });
  }
  document.getElementById("count").textContent = "共 " + filtered.length + " 件";
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">没有找到匹配的物品</div>';
    return;
  }
  container.innerHTML = filtered.map(function(i){
    var cfg = QUALITIES[i.q] || QUALITIES.white;
    var initials = (i.n.replace(/[^\u4e00-\u9fff]/g,'').slice(0,2)) || i.en.slice(0,2);
    var svgIcon = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44"><rect width="44" height="44" rx="8" fill="' + cfg.bg + '"/><text x="22" y="29" text-anchor="middle" font-size="16" font-weight="bold" fill="' + cfg.color + '" font-family="sans-serif">' + initials + '</text></svg>');
    var webpFile = i.en.replace(/'/g,'').replace(/ /g,'_').replace(/\./g,'');
    var webpPath = 'icons/' + webpFile + '.webp';
    var dlcTag = i.dlc ? '<span class="card-dlc" style="background:' + (i.dlc==='合金'?'#713f12':'#164e63') + ';color:' + (i.dlc==='合金'?'#facc15':'#22d3ee') + '">' + i.dlc + ' DLC</span>' : "";
    var srcTag = i.src ? '<span class="card-dlc" style="background:#1a1a2e;color:#8b949e">' + i.src + '</span>' : "";
    return '<div class="card ' + cfg.cls + '">' +
      '<div class="card-header">' +
        '<div class="card-icon" data-svg="' + svgIcon.replace(/"/g,'&quot;') + '" data-webp="' + webpPath + '"></div>' +
        '<div class="card-info">' +
          '<div class="card-name" style="color:' + cfg.color + '">' + i.n + '</div>' +
          '<div class="card-name-en">' + i.en + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-desc">' + i.d + '</div>' +
        (i.s ? '<div class="card-stack">叠加方式：' + i.s + '</div>' : '') +
        dlcTag + srcTag +
      '</div></div>';
  }).join("");
  container.querySelectorAll('.card-icon').forEach(function(el){
    var img = document.createElement('img');
    img.style.cssText = 'width:44px;height:44px';
    img.src = el.dataset.webp;
    img.onerror = function(){ this.src = el.dataset.svg; this.onerror = null; };
    el.appendChild(img);
  });
}

function renderSurvivors() {
  var container = document.getElementById("survivors");
  var filtered = SURVIVORS.slice();
  if (searchTerm) {
    var s = searchTerm.toLowerCase();
    filtered = filtered.filter(function(sv){
      return sv.n.toLowerCase().indexOf(s) !== -1 ||
        sv.en.toLowerCase().indexOf(s) !== -1 ||
        sv.uk.toLowerCase().indexOf(s) !== -1 ||
        (sv.dc||"").toLowerCase().indexOf(s) !== -1 ||
        sv.sk.some(function(sk){ return sk.n.indexOf(s) !== -1 || sk.e.toLowerCase().indexOf(s) !== -1; });
    });
  }
  document.getElementById("count").textContent = "共 " + filtered.length + " 位角色";
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">没有找到匹配的角色</div>';
    return;
  }
  container.innerHTML = filtered.map(function(sv,idx){
    var bgCol = SURVIVOR_BG_COLORS[idx % SURVIVOR_BG_COLORS.length];
    var dlcBadge = "";
    if (sv.dc) {
      var dc = SURVIVOR_DLC_COLORS[sv.dc] || {bg:"#333",fg:"#aaa"};
      dlcBadge = '<span class="survivor-dlc-badge" style="background:' + dc.bg + ';color:' + dc.fg + '">' + sv.dc + ' DLC</span>';
    }
    
    var statsHtml = '<span>HP ' + sv.hp + '(+' + sv.hl + ')</span><span>DMG ' + sv.dg + '(+' + sv.dl + ')</span><span>ARM ' + sv.ar + '</span>';
    var iconFile = 'icons/survivor_' + sv.en.replace(/'/g,'').replace(/ /g,'_').replace(/-/g,'-') + '.webp';
    // Group skills by type: pri/sec/uti/spe/pas
    var groups = {pri:[],sec:[],uti:[],spe:[],pas:[]};
    sv.sk.forEach(function(sk){ if(groups[sk.t]) groups[sk.t].push(sk); });
    
    // Build skill icon helper
    function skIcon(sk) {
      var icn = 'icons/skill_' + sk.e.replace(/'/g,'').replace(/:/g,'').replace(/!/g,'').replace(/\(/g,'').replace(/\)/g,'') + '.webp';
      return '<div class="sk-icon"><img src="' + icn + '" alt="" onerror="this.parentElement.textContent=\'' + sk.n.slice(0,2) + '\'"></div>';
    }
    
    // Build one skill card
    function skCard(sk, isAlt) {
      var cls = isAlt ? 'alt' : 'def';
      var unlockInfo = '';
      if (isAlt && SKILL_UNLOCKS[sk.e]) {
        unlockInfo = '<div class="sk-unlock">' + SKILL_UNLOCKS[sk.e] + '</div>';
      }
      var altBadge = isAlt ? '<div class="skill-alt-badge">解锁替换</div>' : '';
      return '<div class="skill-card ' + cls + '">' + altBadge +
        skIcon(sk) +
        '<div class="sk-name">' + sk.n + '</div>' +
        '<div class="sk-desc">' + sk.d + '</div>' +
        (sk.cd ? '<span class="sk-tag">CD ' + sk.cd + '</span>' : '') +
        (sk.pc ? '<span class="sk-tag">PC ' + sk.pc + '</span>' : '') +
        unlockInfo +
        '</div>';
    }
    
    // Build one skill slot column (M1/M2/Shift/R)
    function skSlot(skills, label, cls) {
      if (!skills.length) return '<div class="skill-slot"><div class="skill-slot-hd ' + cls + '">' + label + '</div><div class="skill-card alt"><div class="sk-desc" style="color:#484f58">无</div></div></div>';
      var h = '<div class="skill-slot"><div class="skill-slot-hd ' + cls + '">' + label + '</div>';
      h += skCard(skills[0], false);
      for (var j = 1; j < skills.length; j++) { h += skCard(skills[j], true); }
      h += '</div>';
      return h;
    }
    
    // Passive banner
    var passiveHtml = '';
    if (groups.pas.length) {
      passiveHtml = groups.pas.map(function(ps){
        return '<div class="survivor-passive"><span class="psv-tag">被动</span><div><span class="psv-name">' + ps.n + '</span> <span class="psv-text">' + ps.d + '</span></div></div>';
      }).join('');
    }
    
    // 4-column skills grid
    var gridHtml = '<div class="skills-grid">' +
      skSlot(groups.pri, 'M1<div class="key">左键·主要技能</div>', 'm1') +
      skSlot(groups.sec, 'M2<div class="key">右键·次要技能</div>', 'm2') +
      skSlot(groups.uti, 'Shift<div class="key">辅助技能</div>', 'sf') +
      skSlot(groups.spe, 'R<div class="key">特殊技能</div>', 'rr') +
      '</div>';
    return '<div class="survivor-card" onclick="this.classList.toggle(\'expanded\')">' +
      '<div class="survivor-header">' +
        '<div class="survivor-icon" style="background:' + bgCol + ';color:#e6edf3">' +
          '<img src="' + iconFile + '" alt="" style="width:48px;height:48px;object-fit:contain" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + sv.n.slice(0,2) + '\'">' +
        '</div>' +
        '<div class="survivor-info">' +
          '<div class="survivor-name">' + sv.n + '</div>' +
          '<div class="survivor-name-en">' + sv.en + '</div>' +
          '<div class="survivor-stats">' + statsHtml + '</div>' +
          dlcBadge +
        '</div>' +
        '<div class="survivor-expand">&#9660;</div>' +
      '</div>' +
      '<div class="survivor-body">' +
        '<div class="survivor-unlock">解锁条件：' + sv.uk + '</div>' +
        passiveHtml +
        gridHtml +
      '</div></div>';
  }).join("");
}

// ===== RENDER ARTIFACTS =====
var CODE_SYM_MAP = {
  "●":"circle",
  "▲":"triangle",
  "■":"square",
  "♦":"diamond"
};

function renderCode(code) {
  if (!code) return '<span class="artifact-code-special">特殊获取</span>';
  var result = '';
  for (var i = 0; i < code.length; i++) {
    var ch = code.charAt(i);
    var cls = CODE_SYM_MAP[ch] || "";
    result += '<span class="cs ' + cls + '">' + ch + '</span>';
  }
  return result;
}

function renderArtifacts() {
  var container = document.getElementById("artifacts");
  var filtered = ARTIFACTS.slice();
  if (searchTerm) {
    var s = searchTerm.toLowerCase();
    filtered = filtered.filter(function(a){
      return a.name.toLowerCase().indexOf(s) !== -1 ||
        a.nameEn.toLowerCase().indexOf(s) !== -1 ||
        a.desc.toLowerCase().indexOf(s) !== -1 ||
        (a.dlc||"").toLowerCase().indexOf(s) !== -1;
    });
  }
  document.getElementById("count").textContent = "共 " + filtered.length + " 个神器";
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">没有找到匹配的神器</div>';
    return;
  }
  container.innerHTML = filtered.map(function(a){
    var dlcBadge = a.dlc ? '<span class="artifact-dlc" style="background:#164e63;color:#22d3ee">' + a.dlc + ' DLC</span>' : "";
    var codeHtml = '<div class="artifact-code">' + renderCode(a.code) + '</div>';
    var unlockNote = a.unlock ? '<div style="margin-top:6px;font-size:0.68rem;color:#8b949e;">'+a.unlock+'</div>' :
      '<div style="margin-top:6px;font-size:0.65rem;color:#484f58;">解锁：在Sky Meadow天台电脑输入密码 → 进入Bulwark\'s Ambry完成试炼</div>';
    return '<div class="artifact-card">' +
      '<div class="artifact-name">' + a.name + ' <span class="artifact-name-en">' + a.nameEn + '</span></div>' +
      codeHtml +
      '<div class="artifact-desc">' + a.desc + '</div>' +
      dlcBadge + unlockNote +
    '</div>';
  }).join("");
}

// ===== SET TAB =====
function setTab(q) {
  activeTab = q;
  renderTabs();
  renderItems();
}

// ===== RENDER CURRENT =====
function renderCurrent() {
  if (activeSection === "items") {
    renderTabs();
    renderItems();
  } else if (activeSection === "survivors") {
    renderSurvivors();
  } else if (activeSection === "artifacts") {
    renderArtifacts();
  }
}

// ===== INIT =====
document.addEventListener("DOMContentLoaded", function() {
  renderTabs();
  renderItems();
  document.getElementById("search").addEventListener("input", function(e) {
    searchTerm = e.target.value.trim();
    renderCurrent();
  });
});
</script>
